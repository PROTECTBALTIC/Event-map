(function() {
    function countAllPopupEntries() {
        var total = 0;
        if (typeof marker_cluster_70cb62903e1173ac4d5b6c11c2bbc034 === 'undefined' || !marker_cluster_70cb62903e1173ac4d5b6c11c2bbc034) return total;

            if (!layer || !layer.getPopup) return;
            var popup = layer.getPopup();
            if (!popup) return;
            var content = popup.getContent ? popup.getContent() : '';
            if (!content) return;

            // Each bullet entry begins after a '•' in the popup HTML
            var parts = String(content).split('•');
            for (var i = 1; i < parts.length; i++) {
                var plain = parts[i].replace(/<[^>]*>/g, '').trim();
                if (!plain) continue;
                total += 1;
            }
        });
        return total;
    }

    function update() {
        var el = document.getElementById('inPersonCount');
        if (!el) return;
        el.textContent = String(countAllPopupEntries());
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(update, 0); });
    } else {
        setTimeout(update, 0);
    }
})();
